name: Build GameBoost IPK (using prebuilt SDK)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PKG_NAME: luci-app-gameboost
  # 使用 OpenWrt 24.10 SDK 下载链接（如果无效请告知，可改用 23.05 版本）
  SDK_URL: https://downloads.openwrt.org/releases/24.10.0/targets/mediatek/filogic/openwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.xz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download and extract OpenWrt SDK
        run: |
          wget -q ${{ env.SDK_URL }} -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy source to package directory
        run: |
          cd sdk
          mkdir -p package/${{ env.PKG_NAME }}
          # 复制您的源码（根据实际目录调整）
          cp -r ../files package/${{ env.PKG_NAME }}/ 2>/dev/null || echo "No files/ directory"
          cp -r ../luasrc package/${{ env.PKG_NAME }}/ 2>/dev/null || echo "No luasrc/ directory"
          cp ../Makefile package/${{ env.PKG_NAME }}/Makefile
          echo "CONFIG_PACKAGE_${{ env.PKG_NAME }}=y" >> .config
          make defconfig

      - name: Compile plugin
        run: |
          cd sdk
          make package/${{ env.PKG_NAME }}/compile V=s -j$(nproc)

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-aarch64_cortex-a53
          path: sdk/bin/packages/aarch64_cortex-a53/**/*.ipk
