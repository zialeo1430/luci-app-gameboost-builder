name: Build IPK for Filogic (MT798x)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build OpenWrt IPK
    runs-on: ubuntu-22.04
    env:
      TARGET: mediatek/filogic
      ARCH: aarch64_cortex-a53
      PKG_NAME: luci-app-gameboost
      SDK_URL: https://downloads.openwrt.org/releases/23.05.3/targets/mediatek/filogic/openwrt-sdk-23.05.3-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Node.js环境（消除警告）
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: 下载并解压SDK
        run: |
          wget -q "${{ env.SDK_URL }}" -O sdk.tar.xz
          mkdir -p sdk
          tar -xJf sdk.tar.xz -C sdk --strip 1
          echo "SDK解压完成"

      - name: 初始化SDK环境
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "feeds更新完成"

      - name: 复制插件代码到SDK
        run: |
          # 清理旧目录，确保复制正确
          rm -rf sdk/package/${{ env.PKG_NAME }}
          mkdir -p sdk/package/${{ env.PKG_NAME }}
          
          # 复制所有插件文件
          cp -r Makefile files luasrc sdk/package/${{ env.PKG_NAME }}/
          
          # 给脚本添加执行权限（关键！很多失败是因为权限不足）
          chmod +x sdk/package/${{ env.PKG_NAME }}/files/etc/init.d/*
          chmod +x sdk/package/${{ env.PKG_NAME }}/files/etc/uci-defaults/*
          chmod +x sdk/package/${{ env.PKG_NAME }}/files/etc/gameboost/*.sh
          
          # 打印目录结构，方便排查
          echo "插件目录结构："
          ls -la sdk/package/${{ env.PKG_NAME }}/

      - name: 编译IPK安装包
        id: build
        run: |
          cd sdk
          
          # 配置编译选项
          echo "CONFIG_PACKAGE_${{ env.PKG_NAME }}=m" > .config
          make defconfig
          
          # 先单线程编译，方便定位错误
          make package/${{ env.PKG_NAME }}/clean V=s
          make package/${{ env.PKG_NAME }}/compile V=s -j1
          
          # 查找生成的IPK文件
          IPK_FILE=$(find ./bin/packages/${{ env.ARCH }}/base -name "${{ env.PKG_NAME }}*.ipk" | head -n 1)
          
          if [ -f "$IPK_FILE" ]; then
            echo "✅ 编译成功，IPK文件：$IPK_FILE"
            echo "ipk_path=$IPK_FILE" >> $GITHUB_OUTPUT
          else
            echo "❌ 编译失败，未找到IPK文件"
            echo "bin目录内容："
            ls -la ./bin/packages/${{ env.ARCH }}/base/
            exit 1
          fi

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-filogic-mt798x
          path: sdk/${{ steps.build.outputs.ipk_path }}
