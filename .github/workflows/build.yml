name: Build GameBoost IPK (Container)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PKG_NAME: luci-app-gameboost

jobs:
  build:
    runs-on: ubuntu-latest
    # 使用针对您路由器架构（mediatek/filogic）的预编译 SDK 镜像
    container:
      image: openwrt/sdk:mediatek-filogic-24.10
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Copy source to SDK package directory
        run: |
          # 在 SDK 容器内创建插件目录
          mkdir -p package/${{ env.PKG_NAME }}
          # 复制您的源码（假设仓库根目录有 files/、luasrc/ 和 Makefile）
          cp -r files package/${{ env.PKG_NAME }}/ 2>/dev/null || echo "No files/ directory"
          cp -r luasrc package/${{ env.PKG_NAME }}/ 2>/dev/null || echo "No luasrc/ directory"
          cp Makefile package/${{ env.PKG_NAME }}/Makefile
          # 配置选中您的插件
          echo "CONFIG_PACKAGE_${{ env.PKG_NAME }}=y" >> .config
          make defconfig

      - name: Compile
        run: |
          make package/${{ env.PKG_NAME }}/compile V=s -j$(nproc)

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-aarch64_cortex-a53
          path: bin/packages/aarch64_cortex-a53/**/*.ipk
