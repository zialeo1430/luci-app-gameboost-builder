name: Build IPK for Filogic

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build OpenWrt IPK
    runs-on: ubuntu-latest
    
    env:
      # 针对 Filogic (MT798x) 的配置
      TARGET: mediatek/filogic
      ARCH: aarch64_cortex-a53
      PKG_NAME: luci-app-gameboost
      # 使用 OpenWrt 23.05 稳定版 SDK
      SDK_URL: "https://downloads.openwrt.org/releases/23.05.3/targets/mediatek/filogic/openwrt-sdk-23.05.3-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev python3 python3-distutils python3-setuptools \
            rsync subversion swig time unzip wget xsltproc zlib1g-dev

      - name: Download & Extract SDK
        run: |
          wget -q "$SDK_URL" -O sdk.tar.xz
          mkdir -p sdk
          tar -xJf sdk.tar.xz -C sdk --strip 1

      - name: Prepare Package
        run: |
          # 将我们的代码复制到 SDK 的 package 目录
          mkdir -p sdk/package/$PKG_NAME
          cp -r ./* sdk/package/$PKG_NAME/ 2>/dev/null || true
          
          # 进入 SDK 目录
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build IPK Package
        id: compile
        run: |
          cd sdk
          
          # 配置仅编译我们的包
          echo "CONFIG_PACKAGE_$PKG_NAME=m" > .config
          make defconfig
          
          # 编译
          echo "开始编译..."
          make package/$PKG_NAME/compile V=s -j$(nproc) || make package/$PKG_NAME/compile V=s -j1
          
          # 查找生成的 ipk
          IPK_PATH=$(find ./bin/packages -name "${PKG_NAME}*.ipk" | head -n 1)
          if [ -z "$IPK_PATH" ]; then
            echo "编译失败，未找到 ipk 文件"
            exit 1
          fi
          echo "ipk_path=$IPK_PATH" >> $GITHUB_OUTPUT
          echo "编译成功: $IPK_PATH"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-filogic
          path: sdk/${{ steps.compile.outputs.ipk_path }}
