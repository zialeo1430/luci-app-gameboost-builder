name: Build GameBoost IPK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  TARGET: mediatek/filogic
  ARCH: aarch64_cortex-a53
  PKG_NAME: luci-app-gameboost

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare OpenWrt SDK
        run: |
          # 使用与您固件版本匹配的 openwrt-24.10 分支
          git clone --depth 1 -b openwrt-24.10 https://github.com/openwrt/openwrt.git sdk
          cd sdk

          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 手动设置目标平台为 mediatek/filogic（您的路由器架构）
          echo "CONFIG_TARGET_mediatek=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_ARCH_PACKAGES=aarch64_cortex-a53" >> .config
          make defconfig

          # 创建插件目录并复制源码（假设仓库根目录有 files/、luasrc/ 和 Makefile）
          mkdir -p package/${{ env.PKG_NAME }}
          cp -r ../files ./ 2>/dev/null || echo "No files/ directory"
          cp -r ../luasrc ./ 2>/dev/null || echo "No luasrc/ directory"
          cp ../Makefile package/${{ env.PKG_NAME }}/Makefile

          # 确保插件被选中
          echo "CONFIG_PACKAGE_${{ env.PKG_NAME }}=y" >> .config
          make defconfig

      - name: Compile
        run: |
          cd sdk
          # 编译您的插件
          make package/${{ env.PKG_NAME }}/compile V=s -j$(nproc)

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ env.ARCH }}
          path: sdk/bin/packages/**/*.ipk
