name: Build GameBoost IPK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  TARGET: mediatek/filogic
  ARCH: aarch64_cortex-a53
  PKG_NAME: luci-app-gameboost

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare OpenWrt SDK
        run: |
          git clone --depth 1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git sdk
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp -r ../files ./
          cp ../Makefile package/${{ env.PKG_NAME }}/Makefile
          echo "CONFIG_PACKAGE_${{ env.PKG_NAME }}=y" >> .config
          make defconfig

      - name: Compile
        run: |
          cd sdk
          make package/${{ env.PKG_NAME }}/compile V=s -j$(nproc)

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ env.ARCH }}
          path: sdk/bin/packages/**/*.ipk
